<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PDF Toolkit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
color:#222;
min-height:100vh;
}

header{
background:#1e293b;
color:white;
padding:30px;
text-align:center;
}

header h1{
font-size:2rem;
margin-bottom:10px;
}

header p{
opacity:.8;
}

nav{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:20px;
justify-content:center;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:white;
transition:.3s;
}

/* Navigation buttons */
nav button{
background:#475569;
}

nav button:hover{
background:#334155;
}

/* Tool buttons */
#jpgBtn{
background:#2563eb;
}

#mergeBtn{
background:#16a34a;
}

#splitBtn{
background:#ea580c;
}

#rotateBtn{
background:#7c3aed;
}

#extractBtn{
background:#0891b2;
}

#watermarkBtn{
background:#dc2626;
}

#signatureBtn{
background:#059669;
}

#clearSignature{
background:#6b7280;
}

button:hover{
opacity:.9;
transform:translateY(-2px);
}

nav button:hover{
background:#cbd5e1;
}

main{
max-width:1000px;
margin:30px auto;
padding:0 20px;
}

.tool{
display:none;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
margin-bottom:25px;
}

.tool.active{
display:block;
}

.tool h2{
margin-bottom:20px;
color:#0f172a;
}

input[type=file],
input[type=text],
select{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:8px;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#2563eb;
color:white;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

#status{
margin-top:20px;
padding:15px;
background:white;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
font-weight:bold;
}

canvas{
border:2px dashed #ccc;
border-radius:10px;
background:white;
margin:15px 0;
max-width:100%;
}

.success{
color:#16a34a;
}

.error{
color:#dc2626;
}

.loader{
display:inline-block;
width:18px;
height:18px;
border:3px solid #ddd;
border-top:3px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
vertical-align:middle;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@media(max-width:768px){

nav{
padding:10px;
}

nav button{
width:100%;
}

header h1{
font-size:1.6rem;
}

.tool{
padding:18px;
}

}

</style>



</head>
<body>

<header>
<h1>PDF Toolkit</h1>
<p>
Merge, Split, Rotate, Watermark,
Sign & Convert PDFs
</p>
</header>

<nav>

<button onclick="showTool('jpg')">
JPG → PDF
</button>

<button onclick="showTool('merge')">
Merge
</button>

<button onclick="showTool('split')">
Split
</button>

<button onclick="showTool('rotate')">
Rotate
</button>

<button onclick="showTool('extract')">
Extract
</button>

<button onclick="showTool('watermark')">
Watermark
</button>

<button onclick="showTool('signature')">
Signature
</button>

</nav>

<main>

<!-- JPG TO PDF -->

<section id="jpg" class="tool active">

<h2>JPG to PDF</h2>

<input
type="file"
id="jpgFiles"
multiple
accept="image/*">

<button id="jpgBtn">
Create PDF
</button>

</section>

<!-- MERGE PDF -->

<section id="merge" class="tool">

<h2>Merge PDF</h2>

<input
type="file"
id="mergeFiles"
multiple
accept=".pdf">

<button id="mergeBtn">
Merge PDFs
</button>

</section>

<!-- SPLIT PDF -->

<section id="split" class="tool">

<h2>Split PDF</h2>

<input
type="file"
id="splitFile"
accept=".pdf">

<button id="splitBtn">
Split PDF
</button>

</section>

<!-- ROTATE PDF -->

<section id="rotate" class="tool">

<h2>Rotate PDF</h2>

<input
type="file"
id="rotateFile"
accept=".pdf">

<select id="rotationAngle">

<option value="90">
90°
</option>

<option value="180">
180°
</option>

<option value="270">
270°
</option>

</select>

<button id="rotateBtn">
Rotate PDF
</button>

</section>

<!-- EXTRACT -->

<section id="extract" class="tool">

<h2>Extract Pages</h2>

<input
type="file"
id="extractFile"
accept=".pdf">

<input
type="text"
id="extractPages"
placeholder="1,3,5">

<button id="extractBtn">
Extract Pages
</button>

</section>

<!-- WATERMARK -->

<section id="watermark" class="tool">

<h2>Add Watermark</h2>

<input
type="file"
id="watermarkFile"
accept=".pdf">

<input
type="text"
id="watermarkText"
placeholder="CONFIDENTIAL">

<button id="watermarkBtn">
Add Watermark
</button>

</section>

<!-- SIGNATURE -->

<section id="signature" class="tool">

<h2>Add Signature</h2>

<input
type="file"
id="signaturePdf"
accept=".pdf">

<h3>Draw Signature</h3>

<canvas
id="signatureCanvas"
width="500"
height="200">
</canvas>

<br>

<button id="clearSignature">
Clear
</button>

<button id="signatureBtn">
Apply Signature
</button>

</section>

<div id="status"></div>

</main>

<script>

const statusBox =
document.getElementById("status");

function setStatus(msg,color="black"){
statusBox.innerHTML=msg;
statusBox.style.color=color;
}

function showTool(id){

document
.querySelectorAll(".tool")
.forEach(tool=>{
tool.classList.remove("active");
});

document
.getElementById(id)
.classList.add("active");
}

/* =========================
   SIGNATURE PAD
========================= */

const canvas =
document.getElementById("signatureCanvas");

const signaturePad =
new SignaturePad(canvas);

document
.getElementById("clearSignature")
.addEventListener("click",()=>{
signaturePad.clear();
});

/* =========================
   JPG TO PDF
========================= */

document
.getElementById("jpgBtn")
.addEventListener("click",async()=>{

const files =
document.getElementById("jpgFiles").files;

if(files.length===0){
alert("Select images");
return;
}

setStatus("Creating PDF...");

const { jsPDF } = window.jspdf;

const pdf =
new jsPDF();

for(let i=0;i<files.length;i++){

const file = files[i];

const reader =
new FileReader();

const imageData =
await new Promise(resolve=>{
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});

if(i>0){
pdf.addPage();
}

pdf.addImage(
imageData,
"JPEG",
10,
10,
190,
270
);

}

pdf.save("images.pdf");

setStatus(
"PDF created successfully",
"green"
);

});

/* =========================
   MERGE PDF
========================= */

document
.getElementById("mergeBtn")
.addEventListener("click",async()=>{

const files =
document.getElementById("mergeFiles").files;

if(files.length<2){

alert(
"Select at least 2 PDFs"
);

return;
}

setStatus("Merging PDFs...");

const mergedPdf =
await PDFLib.PDFDocument.create();

for(const file of files){

const bytes =
await file.arrayBuffer();

const pdf =
await PDFLib
.PDFDocument
.load(bytes);

const pages =
await mergedPdf.copyPages(
pdf,
pdf.getPageIndices()
);

pages.forEach(page=>{
mergedPdf.addPage(page);
});

}

const mergedBytes =
await mergedPdf.save();

downloadPDF(
mergedBytes,
"merged.pdf"
);

setStatus(
"Merge completed",
"green"
);

});

/* =========================
   SPLIT PDF
========================= */

document
.getElementById("splitBtn")
.addEventListener("click",async()=>{

const file =
document
.getElementById("splitFile")
.files[0];

if(!file){
alert("Select PDF");
return;
}

setStatus("Splitting PDF...");

const pdf =
await PDFLib
.PDFDocument
.load(
await file.arrayBuffer()
);

for(
let i=0;
i<pdf.getPageCount();
i++
){

const newPdf =
await PDFLib
.PDFDocument
.create();

const [page] =
await newPdf.copyPages(
pdf,
[i]
);

newPdf.addPage(page);

const bytes =
await newPdf.save();

downloadPDF(
bytes,
`page-${i+1}.pdf`
);

}

setStatus(
"Split completed",
"green"
);

});

/* =========================
   ROTATE PDF
========================= */

document
.getElementById("rotateBtn")
.addEventListener("click",async()=>{

const file =
document
.getElementById("rotateFile")
.files[0];

if(!file){
alert("Select PDF");
return;
}

const angle =
parseInt(
document
.getElementById("rotationAngle")
.value
);

setStatus("Rotating PDF...");

const pdf =
await PDFLib
.PDFDocument
.load(
await file.arrayBuffer()
);

pdf.getPages().forEach(page=>{

page.setRotation(
PDFLib.degrees(angle)
);

});

const bytes =
await pdf.save();

downloadPDF(
bytes,
"rotated.pdf"
);

setStatus(
"Rotation completed",
"green"
);

});

/* =========================
   EXTRACT PAGES
========================= */

document
.getElementById("extractBtn")
.addEventListener("click",async()=>{

const file =
document
.getElementById("extractFile")
.files[0];

if(!file){
alert("Select PDF");
return;
}

const pagesText =
document
.getElementById("extractPages")
.value;

if(!pagesText){
alert(
"Enter page numbers"
);
return;
}

setStatus("Extracting pages...");

const pdf =
await PDFLib
.PDFDocument
.load(
await file.arrayBuffer()
);

const newPdf =
await PDFLib
.PDFDocument
.create();

const indexes =
pagesText
.split(",")
.map(x=>parseInt(x)-1);

const pages =
await newPdf.copyPages(
pdf,
indexes
);

pages.forEach(page=>{
newPdf.addPage(page);
});

const bytes =
await newPdf.save();

downloadPDF(
bytes,
"extracted.pdf"
);

setStatus(
"Pages extracted",
"green"
);

});

/* =========================
   WATERMARK
========================= */

document
.getElementById("watermarkBtn")
.addEventListener("click",async()=>{

const file =
document
.getElementById("watermarkFile")
.files[0];

if(!file){
alert("Select PDF");
return;
}

const text =
document
.getElementById("watermarkText")
.value;

if(!text){
alert(
"Enter watermark text"
);
return;
}

setStatus("Adding watermark...");

const pdf =
await PDFLib
.PDFDocument
.load(
await file.arrayBuffer()
);

pdf.getPages().forEach(page=>{

page.drawText(text,{

x:100,
y:300,
size:40,
opacity:0.4

});

});

const bytes =
await pdf.save();

downloadPDF(
bytes,
"watermarked.pdf"
);

setStatus(
"Watermark added",
"green"
);

});

/* =========================
   SIGN PDF
========================= */

document
.getElementById("signatureBtn")
.addEventListener("click",async()=>{

const file =
document
.getElementById("signaturePdf")
.files[0];

if(!file){
alert("Select PDF");
return;
}

if(signaturePad.isEmpty()){

alert(
"Draw your signature"
);

return;
}

setStatus("Adding signature...");

const pdf =
await PDFLib
.PDFDocument
.load(
await file.arrayBuffer()
);

const png =
signaturePad
.toDataURL("image/png");

const imageBytes =
await fetch(png)
.then(r=>r.arrayBuffer());

const image =
await pdf.embedPng(
imageBytes
);

const page =
pdf.getPages()[0];

page.drawImage(image,{

x:50,
y:50,
width:150,
height:70

});

const bytes =
await pdf.save();

downloadPDF(
bytes,
"signed.pdf"
);

setStatus(
"Signature added",
"green"
);

});

/* =========================
   DOWNLOAD HELPER
========================= */

function downloadPDF(
bytes,
filename
){

const blob =
new Blob(
[bytes],
{
type:"application/pdf"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href=url;
a.download=filename;

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
